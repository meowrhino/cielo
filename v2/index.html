<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>cielo</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="icon" href="favicon/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Astrolabio (siempre fullscreen) -->
  <div id="astrolabe-wrapper">
    <canvas id="astrolabe"></canvas>
    <button id="flip-btn" title="girar al otro lado del mundo">↕</button>
    <button id="night-btn" title="modo nocturno">☽</button>
  </div>

  <!-- Overlay de zoom (nombre watermark + botón volver) -->
  <div id="detail-view" class="hidden">
    <div id="detail-label"></div>
    <button id="back-btn">volver</button>
  </div>

  <!-- Tooltip para estrellas/planetas -->
  <div id="tooltip" class="tooltip hidden"></div>

  <!-- Overlays de info -->
  <div id="info-tl" class="info-overlay">
    <div id="time-display"></div>
    <div id="date-display"></div>
    <div id="ar-label" class="hidden">visión mapa</div>
  </div>

  <div id="info-tr" class="info-overlay">
    <div id="location-name">barcelona</div>
    <div id="location-coords">41.4°N · 2.2°E</div>
  </div>

  <div id="info-bottom" class="info-overlay">
    <span id="sun-info"></span>
    <span id="moon-info"></span>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
