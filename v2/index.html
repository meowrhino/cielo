<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>cielo · barcelona</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Astrolabio (siempre fullscreen) -->
  <div id="astrolabe-wrapper">
    <canvas id="astrolabe"></canvas>
    <button id="flip-btn" title="girar al otro lado del mundo">↕</button>
  </div>

  <!-- Overlay de zoom (nombre watermark + poesía) -->
  <div id="detail-view" class="hidden">
    <div id="detail-label"></div>
    <div id="detail-poetry"></div>
  </div>

  <!-- Overlays de info -->
  <div id="info-tl" class="info-overlay">
    <div id="time-display"></div>
    <div id="date-display"></div>
  </div>

  <div id="info-tr" class="info-overlay">
    <div id="location-name">barcelona</div>
    <div id="location-coords">41.4°N · 2.2°E</div>
  </div>

  <div id="info-bottom" class="info-overlay">
    <span id="sun-info"></span>
    <span id="moon-info"></span>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
