<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>cielo</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="icon" href="favicon/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Astrolabio -->
  <div id="astrolabe-wrapper">
    <canvas id="astrolabe"></canvas>
  </div>

  <!-- Overlay de zoom -->
  <div id="detail-view" class="hidden">
    <div id="detail-label"></div>
    <button id="back-btn" class="text-btn">volver</button>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip hidden"></div>

  <!-- Pestaña del menú (siempre visible) -->
  <button id="menu-tab" class="text-btn">cielo</button>

  <!-- Barra de menú compacta -->
  <div id="menu-bar" class="menu-bar hidden">
    <button id="info-btn" class="text-btn">info</button>
    <button id="ubi-btn" class="text-btn">ubi</button>
    <button id="tema-btn" class="text-btn">tema</button>
    <button id="vuelta-btn" class="text-btn">vuelta</button>
    <button id="ar-btn" class="text-btn">mapa</button>
  </div>

  <!-- Panel de info -->
  <div id="info-panel" class="info-panel hidden">
    <div class="info-row">
      <div>
        <div id="time-display"></div>
        <div id="date-display"></div>
      </div>
      <div class="info-right">
        <div id="location-name">barcelona</div>
        <div id="location-coords">41.4°N · 2.2°E</div>
      </div>
    </div>
    <div class="info-row info-astro">
      <span id="sun-info"></span>
      <span id="moon-info"></span>
    </div>
    <div class="mag-control">
      <span id="mag-label">mag 6</span>
      <input type="range" id="mag-slider" min="2" max="6.5" step="0.5" value="6">
    </div>
  </div>

  <!-- Modal de temas -->
  <div id="tema-modal" class="tema-modal hidden">
    <button class="text-btn tema-option" data-tema="0">normal</button>
    <button class="text-btn tema-option" data-tema="1">noche</button>
    <button class="text-btn tema-option" data-tema="2">cálido</button>
    <button class="text-btn tema-option" data-tema="3">frío</button>
    <button class="text-btn tema-option" data-tema="4">verde</button>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
