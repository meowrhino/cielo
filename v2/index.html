<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#000000">
  <title>cielo</title>
  <link rel="apple-touch-icon" sizes="180x180" href="favicon/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="favicon/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="favicon/favicon-16x16.png">
  <link rel="icon" href="favicon/favicon.ico">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Astrolabio -->
  <div id="astrolabe-wrapper">
    <canvas id="astrolabe"></canvas>
  </div>

  <!-- Overlay de zoom -->
  <div id="detail-view" class="hidden">
    <div id="detail-label"></div>
    <button id="back-btn" class="text-btn">volver</button>
  </div>

  <!-- Tooltip -->
  <div id="tooltip" class="tooltip hidden"></div>

  <!-- Pestaña del menú (siempre visible) -->
  <button id="menu-tab" class="text-btn">cielo</button>

  <!-- Menú drawer -->
  <div id="drawer" class="drawer hidden">
    <div class="drawer-content">
      <div class="drawer-row">
        <div>
          <div id="time-display"></div>
          <div id="date-display"></div>
        </div>
        <div class="drawer-right">
          <div id="location-name">barcelona</div>
          <div id="location-coords">41.4°N · 2.2°E</div>
        </div>
      </div>

      <div class="drawer-row drawer-info">
        <span id="sun-info"></span>
        <span id="moon-info"></span>
      </div>

      <div class="drawer-row drawer-actions">
        <button id="location-btn" class="text-btn">ubicación</button>
        <button id="mode-btn" class="text-btn">normal</button>
        <button id="flip-btn" class="text-btn">antípoda</button>
        <button id="ar-btn" class="text-btn">visión mapa</button>
      </div>
    </div>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
