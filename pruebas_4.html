<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prueba 4 · generativo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    height: 100vh;
  }
  canvas { display: block; }
  .credit {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.15);
    font-family: system-ui, sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="credit">generativo &middot; cielo</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Particles (stars that breathe)
class Star {
  constructor() {
    this.reset();
    this.born = performance.now() - Math.random() * 10000;
  }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.baseRadius = 0.3 + Math.random() * 2;
    this.breathSpeed = 0.0005 + Math.random() * 0.002;
    this.breathAmp = 0.3 + Math.random() * 0.7;
    this.phase = Math.random() * Math.PI * 2;
    this.hue = 200 + Math.random() * 40;
    this.sat = 10 + Math.random() * 30;
    this.maxAlpha = 0.2 + Math.random() * 0.6;
  }
  draw(t) {
    const age = t - this.born;
    const fadeIn = Math.min(1, age / 3000);
    const breath = 1 + this.breathAmp * Math.sin(t * this.breathSpeed + this.phase);
    const r = this.baseRadius * breath;
    const alpha = this.maxAlpha * fadeIn * (0.5 + 0.5 * Math.sin(t * this.breathSpeed * 0.7 + this.phase));

    // Outer glow
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, r * 8);
    grd.addColorStop(0, `hsla(${this.hue}, ${this.sat}%, 80%, ${alpha * 0.5})`);
    grd.addColorStop(1, `hsla(${this.hue}, ${this.sat}%, 80%, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r * 8, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `hsla(${this.hue}, ${this.sat}%, 90%, ${alpha})`;
    ctx.beginPath();
    ctx.arc(this.x, this.y, r, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Constellation lines that draw themselves
class ConstellationLine {
  constructor(x1, y1, x2, y2) {
    this.x1 = x1; this.y1 = y1;
    this.x2 = x2; this.y2 = y2;
    this.progress = 0;
    this.speed = 0.0002 + Math.random() * 0.0005;
    this.delay = Math.random() * 8000;
    this.born = performance.now();
    this.alpha = 0;
    this.direction = 1;
  }
  draw(t) {
    const age = t - this.born;
    if (age < this.delay) return;

    this.progress += this.speed * this.direction;

    if (this.progress >= 1) {
      this.progress = 1;
      this.direction = 0;
      // Fade after drawn
      this.alpha = Math.max(0, this.alpha - 0.0003);
    } else {
      this.alpha = Math.min(0.25, this.alpha + 0.002);
    }

    if (this.alpha <= 0 && this.direction === 0) {
      // Reset
      this.progress = 0;
      this.direction = 1;
      this.delay = Math.random() * 5000;
      this.born = t;
      return;
    }

    const ex = this.x1 + (this.x2 - this.x1) * this.progress;
    const ey = this.y1 + (this.y2 - this.y1) * this.progress;

    ctx.strokeStyle = `rgba(120, 160, 220, ${this.alpha})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(this.x1, this.y1);
    ctx.lineTo(ex, ey);
    ctx.stroke();
  }
}

// Drifting nebula particles
class Nebula {
  constructor() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.r = 50 + Math.random() * 150;
    this.vx = (Math.random() - 0.5) * 0.05;
    this.vy = (Math.random() - 0.5) * 0.03;
    this.hue = 220 + Math.random() * 60;
    this.alpha = 0.005 + Math.random() * 0.015;
  }
  draw(t) {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -this.r) this.x = W + this.r;
    if (this.x > W + this.r) this.x = -this.r;
    if (this.y < -this.r) this.y = H + this.r;
    if (this.y > H + this.r) this.y = -this.r;

    const breathe = 1 + 0.2 * Math.sin(t * 0.0003 + this.x * 0.01);
    const grd = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * breathe);
    grd.addColorStop(0, `hsla(${this.hue}, 40%, 50%, ${this.alpha})`);
    grd.addColorStop(1, `hsla(${this.hue}, 40%, 50%, 0)`);
    ctx.fillStyle = grd;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * breathe, 0, Math.PI * 2);
    ctx.fill();
  }
}

// Create elements
const stars = Array.from({length: 500}, () => new Star());
const nebulae = Array.from({length: 8}, () => new Nebula());

// Create constellation patterns
const cx = W / 2, cy = H / 2;
const constellations = [];
const patterns = [
  // Pattern 1 - scattered across screen
  [[0.2, 0.3], [0.25, 0.22]],
  [[0.25, 0.22], [0.32, 0.25]],
  [[0.32, 0.25], [0.30, 0.35]],
  [[0.30, 0.35], [0.2, 0.3]],
  // Pattern 2
  [[0.6, 0.15], [0.65, 0.2]],
  [[0.65, 0.2], [0.7, 0.18]],
  [[0.7, 0.18], [0.75, 0.25]],
  // Pattern 3
  [[0.4, 0.6], [0.45, 0.55]],
  [[0.45, 0.55], [0.5, 0.58]],
  [[0.5, 0.58], [0.48, 0.65]],
  [[0.48, 0.65], [0.4, 0.6]],
  [[0.45, 0.55], [0.42, 0.48]],
  // Pattern 4
  [[0.75, 0.5], [0.8, 0.45]],
  [[0.8, 0.45], [0.85, 0.5]],
  [[0.85, 0.5], [0.82, 0.6]],
  [[0.82, 0.6], [0.75, 0.5]],
  // Pattern 5
  [[0.15, 0.7], [0.2, 0.65]],
  [[0.2, 0.65], [0.28, 0.68]],
  [[0.28, 0.68], [0.25, 0.75]],
];

patterns.forEach(([a, b]) => {
  constellations.push(new ConstellationLine(a[0] * W, a[1] * H, b[0] * W, b[1] * H));
});

function render(t) {
  // Fade trail effect
  ctx.fillStyle = 'rgba(0, 0, 0, 0.08)';
  ctx.fillRect(0, 0, W, H);

  // Nebulae (behind everything)
  nebulae.forEach(n => n.draw(t));

  // Constellation lines
  constellations.forEach(c => c.draw(t));

  // Stars
  stars.forEach(s => s.draw(t));

  requestAnimationFrame(render);
}

// Initial clear
ctx.fillStyle = '#000';
ctx.fillRect(0, 0, W, H);

requestAnimationFrame(render);
</script>
</body>
</html>
