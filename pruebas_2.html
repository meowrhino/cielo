<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>prueba 2 · atlas celestial</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0f;
    color: #d4c5a0;
    font-family: 'Cormorant Garamond', serif;
    overflow: hidden;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .atlas {
    width: 90vmin;
    height: 90vmin;
    position: relative;
  }

  .atlas svg {
    width: 100%;
    height: 100%;
  }

  .title {
    position: fixed;
    top: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(212, 197, 160, 0.5);
  }

  .subtitle {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-style: italic;
    font-weight: 300;
    color: rgba(212, 197, 160, 0.3);
  }

  .info {
    position: fixed;
    top: 2rem;
    right: 2.5rem;
    text-align: right;
    font-size: 13px;
    font-weight: 300;
    color: rgba(212, 197, 160, 0.4);
    line-height: 1.8;
  }
</style>
</head>

<div class="info">

</div>
